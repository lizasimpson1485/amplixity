<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Amplixity GTM Workshop Tool</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --color-bg: #0d0d1a;
    --color-surface: #13131f;
    --color-card: #1a1a2e;
    --color-border: rgba(255,255,255,0.08);
    --color-border-hover: rgba(255,255,255,0.16);
    --color-text: #f0f0f5;
    --color-text-muted: #8a8aaa;
    --color-purple: #7c3aed;
    --color-purple-light: #b06ef3;
    --color-purple-faint: rgba(124,58,237,0.12);
    --color-purple-faint2: rgba(124,58,237,0.2);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body {
    font-family: var(--font);
    background: var(--color-bg);
    color: var(--color-text);
    min-height: 100vh;
    padding: 32px 24px 60px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  .container.output-active { max-width: 1100px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--color-surface);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 20px 32px;
    margin-bottom: 24px;
  }
  .logo-sub { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; }
  .progress-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .step-label { font-size: 12px; color: var(--color-text-muted); }
  .progress-bar { width: 180px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 4px; }
  .progress-fill { height: 4px; border-radius: 4px; background: linear-gradient(90deg, var(--color-purple), var(--color-purple-light)); transition: width 0.4s ease; }
  .step-dots { display: flex; gap: 5px; }
  .step-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: all 0.2s; }
  .step-dot.active { background: var(--color-purple-light); width: 18px; border-radius: 4px; }
  .step-dot.done { background: rgba(176,110,243,0.5); }

  /* Sections */
  .section {
    background: var(--color-surface);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 16px; font-weight: 700; letter-spacing: -0.02em;
    text-transform: none; color: var(--color-purple-light);
    font-family: var(--font-heading);
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
  }
  .section-desc { font-size: 13px; color: var(--color-text-muted); margin-bottom: 16px; line-height: 1.5; }

  /* Fields */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 13px; font-weight: 400; color: var(--color-text-muted); margin-bottom: 5px; }
  label .hint { font-weight: 400; color: var(--color-text-muted); }
  input[type=text], input[type=number], textarea, select {
    width: 100%; background: var(--color-card);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-sm);
    color: var(--color-text);
    font-family: var(--font);
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input[type=text]:focus, input[type=number]:focus, textarea:focus, select:focus {
    border-color: var(--color-purple);
  }
  input[type=text]::placeholder, input[type=number]::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }
  textarea { resize: vertical; min-height: 88px; line-height: 1.6; }
  select { cursor: pointer; }
  select option { background: #1a1a2e; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid3 input, .grid3 select { min-width: 0; }

  /* Pipeline sources */
  .source-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-top: 6px; }
  .source-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--color-card); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-sm); padding: 8px 10px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .source-item.active { border-color: var(--color-purple); background: var(--color-purple-faint); }
  .source-item input[type=checkbox] { width: auto; flex-shrink: 0; accent-color: var(--color-purple); cursor: pointer; }
  .source-item span { font-size: 14px; flex: 1; }
  .source-pct { width: 50px !important; font-size: 12px !important; padding: 4px 6px !important; text-align: right; }
  .pct-status { margin-top: 8px; font-size: 12px; color: var(--color-text-muted); }
  .pct-warn { color: #f59e0b; }

  /* Score buttons */
  .score-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid var(--color-border); }
  .score-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .score-label { font-size: 13px; flex: 1; line-height: 1.4; color: var(--color-text); }
  .score-btns { display: flex; gap: 5px; }
  .score-btn {
    width: 34px; height: 34px;
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-sm);
    background: var(--color-card);
    font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--color-text-muted);
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .score-btn:hover { border-color: var(--color-purple); color: var(--color-purple-light); }
  .score-btn.active { background: var(--color-purple); border-color: var(--color-purple); color: #fff; }

  /* Output cards */
  .output-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .output-card {
    background: var(--color-card); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md); padding: 12px 14px; cursor: pointer;
    transition: all 0.15s;
  }
  .output-card:hover { border-color: var(--color-border-hover); }
  .output-card.selected { border-color: var(--color-purple); background: var(--color-purple-faint); }
  .output-card-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .output-card-desc { font-size: 13px; color: var(--color-text-muted); line-height: 1.4; }

  /* Nav */
  .nav { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; gap: 12px; }
  .btn-back {
    background: transparent; border: 0.5px solid var(--color-border);
    color: var(--color-text-muted); padding: 10px 18px;
    border-radius: var(--radius-md); font-size: 14px; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .btn-back:hover { border-color: var(--color-border-hover); color: var(--color-text); }
  .btn-next {
    background: var(--color-purple); border: none; color: #fff;
    padding: 10px 22px; border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .btn-next:hover { background: #6d28d9; }
  .btn-generate {
    background: var(--color-purple); border: none; color: #fff;
    padding: 11px 24px; border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 7px;
    transition: background 0.15s;
  }
  .btn-generate:hover { background: #6d28d9; }
  .btn-generate:disabled { background: #4a2a7a; color: rgba(255,255,255,0.5); cursor: not-allowed; }

  /* Output panel */
  .tab-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tab {
    padding: 6px 13px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 0.5px solid var(--color-border-hover);
    background: var(--color-card); color: #ffffff;
    transition: all 0.15s; white-space: nowrap;
  }
  .tab:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
  .tab.active { background: var(--color-purple); border-color: var(--color-purple); color: #fff; }
  .tab.done { border-color: rgba(176,110,243,0.5); background: rgba(124,58,237,0.15); color: #fff; }

  .dl-btn {
    background: transparent; border: 0.5px solid var(--color-border-hover);
    color: #fff; padding: 6px 12px;
    border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .dl-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
  .view-btn {
    background: transparent; border: 0.5px solid var(--color-border-hover);
    color: #fff; padding: 6px 12px;
    border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .view-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }

  .result-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--color-purple-faint2); color: var(--color-purple-light);
    font-size: 12px; font-weight: 500; padding: 4px 10px;
    border-radius: var(--radius-sm); margin-bottom: 12px;
  }
  .result-box {
    background: var(--color-card); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md); padding: 18px 20px;
    font-size: 15px; line-height: 1.8; color: var(--color-text);
    white-space: pre-wrap; font-family: var(--font);
    max-height: 520px; overflow-y: auto;
  }
  .result-box.placeholder { color: var(--color-text-muted); font-style: italic; }
  .result-box::-webkit-scrollbar { width: 4px; }
  .result-box::-webkit-scrollbar-track { background: transparent; }
  .result-box::-webkit-scrollbar-thumb { background: var(--color-border-hover); border-radius: 2px; }

  /* Copy button */
  .copy-btn {
    background: transparent; border: 0.5px solid var(--color-border-hover);
    color: #fff; padding: 6px 12px;
    border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }

  .cac-card {
    background: var(--color-card); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md); padding: 16px 20px; margin-top: 16px;
  }
  .cac-card-title { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-purple-light); margin-bottom: 12px; }
  .cac-metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .cac-metric { background: var(--color-surface); border: 0.5px solid var(--color-border); border-radius: var(--radius-sm); padding: 12px 14px; text-align: center; }
  .cac-metric-val { font-size: 22px; font-weight: 700; color: var(--color-purple-light); line-height: 1.2; }
  .cac-metric-label { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; line-height: 1.3; }
  .cac-metric.highlight { border-color: var(--color-purple); background: var(--color-purple-faint); }
  .cac-metric.highlight .cac-metric-val { color: #fff; }
  .cac-insight { margin-top: 14px; padding: 12px 14px; background: rgba(176,110,243,0.08); border-left: 3px solid var(--color-purple); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 14px; line-height: 1.6; color: var(--color-text-muted); }
  .cac-insight strong { color: var(--color-text); }
  .cac-empty { font-size: 14px; color: var(--color-text-muted); font-style: italic; padding: 8px 0; }



  /* ── Heading font ── */
  :root { --font-heading: 'Space Grotesk', var(--font); }
  .section-title, .viz-header, .out-empty-title, .stat-val,
  .viz-section h1, .viz-section h2, .viz-section h3,
  .md-body h1, .md-body h2, .md-body h3,
  .out-topbar .out-client-name, .stage-title,
  .score-item-val, .cac-metric-val, .capacity-metric-val,
  .output-block-title, .client-name, .logo-sub,
  .out-generate-btn, .btn-next { font-family: var(--font-heading); }

  /* Section titles get the italic style like "Let's build your revenue engine." */

  .section-title i { font-style: normal; margin-right: 8px; }
  .section-desc { font-size: 14px; }



  /* ── Particle / ambient background ── */
  #particle-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; opacity:0.45; }
  .container { position:relative; z-index:1; }

  /* ── Step slide-in ── */
  @keyframes slideUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
  .section { animation: slideUp 0.38s cubic-bezier(.22,1,.36,1) both; }

  /* ── Field focus glow ── */
  input[type=text]:focus, input[type=number]:focus, textarea:focus, select:focus {
    border-color: var(--color-purple);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.18);
  }

  /* ── Output streaming text ── */
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .result-box { animation: fadeIn 0.3s ease; }

  /* ── Pulse on generate button ── */
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.5); }
    50%      { box-shadow: 0 0 0 8px rgba(124,58,237,0); }
  }
  .btn-generate:not(:disabled) { animation: pulse-glow 2.4s ease infinite; }

  /* ── Score button hover pop ── */
  .score-btn:hover { transform: scale(1.12); }

  /* ── Tab slide indicator ── */
  .tab { position:relative; overflow:hidden; }
  .tab::after { content:''; position:absolute; bottom:0; left:50%; width:0; height:2px; background:var(--color-purple-light); transition: width 0.2s ease, left 0.2s ease; }
  .tab:hover::after { width:80%; left:10%; }
  .tab.active::after { width:100%; left:0; }

  /* ── Output card hover lift ── */
  .output-card { transition: all 0.18s ease; }
  .output-card:hover { transform: translateY(-2px); border-color: rgba(176,110,243,0.5); }
  .output-card.selected { transform: translateY(-2px); }

  /* ── Header shimmer on logo ── */
  .header { position:relative; overflow:hidden; }
  .header::before { content:''; position:absolute; top:-50%; left:-60%; width:40%; height:200%; background:linear-gradient(105deg,transparent 40%,rgba(176,110,243,0.06) 50%,transparent 60%); animation: shimmer 4s ease infinite; pointer-events:none; }
  @keyframes shimmer { 0%{left:-60%} 100%{left:160%} }

  /* ── Progress fill pulse ── */
  .progress-fill { position:relative; }
  .progress-fill::after { content:''; position:absolute; right:0; top:0; height:100%; width:20px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4)); animation: progress-shine 1.5s ease infinite; border-radius:4px; }
  @keyframes progress-shine { 0%,100%{opacity:0} 50%{opacity:1} }

  /* ── Source item check bounce ── */
  .source-item { transition: all 0.18s ease; }
  .source-item.active { transform: scale(1.02); }

  /* ── CAC metric highlight pulse ── */
  .cac-metric.highlight { animation: cac-pulse 3s ease infinite; }
  @keyframes cac-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0)} 50%{box-shadow:0 0 0 6px rgba(124,58,237,0.12)} }

  /* ── Generating spinner text fade ── */
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
  .generating-dots::after { content:'.'; animation: dots 1.2s steps(1) infinite; }



  /* ── Output shell ── */
  .out-shell { display: flex; flex-direction: column; height: calc(100vh - 120px); background: var(--color-surface); border: 0.5px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }

  .out-topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 0.5px solid var(--color-border); background: #0d0d1a; flex-shrink: 0; gap: 12px; flex-wrap: wrap; }
  .out-client-name { font-size: 14px; font-weight: 500; color: var(--color-text-muted); }
  .btn-back-sm { background: transparent; border: 0.5px solid var(--color-border-hover); color: #fff; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 5px; }
  .btn-back-sm:hover { background: rgba(255,255,255,0.06); }

  .out-generate-btn { background: var(--color-purple); border: none; color: #fff; padding: 9px 18px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 6px; animation: pulse-glow 2.4s ease infinite; }
  .out-generate-btn:hover { background: #6d28d9; }
  .out-generate-btn:disabled { background: #4a2a7a; opacity: 0.6; cursor: not-allowed; animation: none; }
  .out-action-btn { background: transparent; border: 0.5px solid var(--color-border-hover); color: #fff; padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
  .out-action-btn:hover { background: rgba(255,255,255,0.06); }

  /* Progress */
  .out-progress-bar-wrap { height: 3px; background: rgba(255,255,255,0.06); }
  .out-progress-bar { height: 3px; background: linear-gradient(90deg, var(--color-purple), var(--color-purple-light)); transition: width 0.5s ease; }
  .out-progress-label { padding: 8px 20px; font-size: 12px; color: var(--color-text-muted); background: rgba(124,58,237,0.06); border-bottom: 0.5px solid var(--color-border); }

  /* Tab strip */
  .out-tab-strip { display: flex; gap: 0; border-bottom: 0.5px solid var(--color-border); overflow-x: auto; flex-shrink: 0; background: #0d0d1a; scrollbar-width: none; }
  .out-tab-strip::-webkit-scrollbar { display: none; }
  .out-tab { background: transparent; border: none; border-bottom: 2px solid transparent; color: rgba(255,255,255,0.5); padding: 11px 16px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 5px; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .out-tab:hover { color: #fff; background: rgba(255,255,255,0.04); }
  .out-tab.active { color: #fff; border-bottom-color: var(--color-purple-light); background: rgba(124,58,237,0.08); }
  .out-tab.done { color: rgba(255,255,255,0.75); }
  .out-tab.active.done { color: #fff; }

  /* Content area */
  .out-content-area { flex: 1; overflow-y: auto; }
  .out-content-area::-webkit-scrollbar { width: 4px; }
  .out-content-area::-webkit-scrollbar-thumb { background: var(--color-border-hover); border-radius: 2px; }

  /* Empty state */
  .out-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 40px; text-align: center; min-height: 300px; }
  .out-empty-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: #fff; }
  .out-empty-desc { font-size: 14px; color: var(--color-text-muted); margin-bottom: 24px; max-width: 380px; line-height: 1.6; }
  .out-generate-single { background: var(--color-purple); border: none; color: #fff; padding: 11px 22px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 7px; }
  .out-generate-single:hover { background: #6d28d9; }

  /* Result */
  .out-result-wrap { padding: 20px 24px; }
  .out-result-actions { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .out-result-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--color-purple-faint2); color: var(--color-purple-light); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: var(--radius-sm); text-transform: uppercase; letter-spacing: 0.05em; }
  .out-result-text { font-size: 15px; line-height: 1.85; white-space: pre-wrap; color: var(--color-text); background: var(--color-card); border: 0.5px solid var(--color-border); border-radius: var(--radius-md); padding: 20px 24px; animation: fadeIn 0.4s ease; }

  .btn-generate-all-OLD {
    background: transparent; border: 1.5px solid var(--color-purple);
    color: var(--color-purple-light); padding: 11px 20px; border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 7px;
    transition: all 0.2s ease;
  }
  .btn-generate-all:hover { background: var(--color-purple-faint); border-color: var(--color-purple-light); }
  .btn-generate-all:disabled { opacity: 0.4; cursor: not-allowed; }

  /* All-outputs panel */
  .all-outputs-wrap { display: flex; flex-direction: column; gap: 20px; }
  .output-block { background: var(--color-card); border: 0.5px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden; }
  .output-block-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid var(--color-border); cursor: pointer; }
  .output-block-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: var(--color-text); }
  .output-block-status { font-size: 12px; color: var(--color-text-muted); display: flex; align-items: center; gap: 6px; }
  .output-block-body { padding: 16px; font-size: 14px; line-height: 1.8; white-space: pre-wrap; color: var(--color-text); display: none; }
  .output-block-body.open { display: block; animation: fadeIn 0.3s ease; }
  .output-block.done .output-block-header { border-bottom-color: rgba(124,58,237,0.2); }
  .output-block.done .output-block-title { color: #fff; }
  .output-block.done .output-block-status { color: var(--color-purple-light); }

  /* Big loading overlay for generate all */
  .gen-all-progress { background: var(--color-surface); border: 0.5px solid var(--color-border); border-radius: var(--radius-lg); padding: 32px 24px; text-align: center; margin-bottom: 16px; }
  .gen-all-progress-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: #fff; }
  .gen-all-progress-sub { font-size: 14px; color: var(--color-text-muted); margin-bottom: 20px; }
  .gen-all-bar-wrap { background: rgba(255,255,255,0.06); border-radius: 6px; height: 8px; overflow: hidden; margin-bottom: 12px; }
  .gen-all-bar { height: 8px; border-radius: 6px; background: linear-gradient(90deg, var(--color-purple), var(--color-purple-light)); transition: width 0.6s ease; }
  .gen-all-current { font-size: 13px; color: var(--color-purple-light); }

  /* View toggle */
  .view-toggle { display: flex; gap: 6px; margin-bottom: 16px; }
  .view-toggle-btn { padding: 6px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--color-border-hover); background: var(--color-card); color: #fff; transition: all 0.15s; }
  .view-toggle-btn.active { background: var(--color-purple); border-color: var(--color-purple); }


  /* Markdown rendering */
  .md-body { font-size: 14px; line-height: 1.75; color: var(--color-text); }
  .md-h1 { font-size: 18px; font-weight: 700; color: #fff; margin: 20px 0 8px; font-family: var(--font-heading); }
  .md-h2 { font-size: 16px; font-weight: 600; color: #fff; margin: 18px 0 6px; font-family: var(--font-heading); padding-bottom: 6px; border-bottom: 0.5px solid var(--color-border); }
  .md-h3 { font-size: 13px; font-weight: 700; color: var(--color-purple-light); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--font-heading); }
  .md-p { margin: 0 0 10px; }
  .md-gap { height: 8px; }
  .md-hr { border: none; border-top: 0.5px solid var(--color-border); margin: 16px 0; }
  .md-body strong { color: #fff; font-weight: 600; }
  .md-body em { color: var(--color-text-muted); font-style: italic; }
  .md-body code { background: rgba(124,58,237,0.15); color: var(--color-purple-light); padding: 1px 6px; border-radius: 4px; font-size: 13px; }
  .md-list { list-style: none; padding: 0; margin: 4px 0 12px; }
  .md-list li { padding: 5px 0 5px 18px; position: relative; border-bottom: 0.5px solid rgba(255,255,255,0.03); font-size: 14px; }
  .md-list li::before { content: "→"; position: absolute; left: 0; color: var(--color-purple-light); font-size: 11px; top: 7px; }
  .md-numbered li::before { content: counter(md-li); counter-increment: md-li; background: var(--color-purple); color: #fff; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; top: 6px; }
  .md-numbered { counter-reset: md-li; }
  .md-table { width: 100%; border-collapse: collapse; margin: 12px 0 16px; font-size: 13px; }
  .md-table th { background: var(--color-purple-faint); color: var(--color-purple-light); font-weight: 600; padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(124,58,237,0.3); font-size: 12px; }
  .md-table td { padding: 8px 12px; border-bottom: 0.5px solid rgba(255,255,255,0.04); vertical-align: top; }
  .md-table tr:hover td { background: rgba(255,255,255,0.02); }

  /* ── Visual Output Components ── */
  .viz-wrap { padding: 0 0 32px; }
  .viz-section { margin-bottom: 28px; animation: slideUp 0.4s ease both; }
  .viz-section:nth-child(2) { animation-delay: 0.05s; }
  .viz-section:nth-child(3) { animation-delay: 0.10s; }
  .viz-section:nth-child(4) { animation-delay: 0.15s; }
  .viz-section:nth-child(5) { animation-delay: 0.20s; }
  .viz-section:nth-child(6) { animation-delay: 0.25s; }

  .viz-header { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; text-transform: none; color: var(--color-purple-light); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; font-family: var(--font-heading); }
  .viz-header::after { content:''; flex:1; height:0.5px; background: linear-gradient(90deg, rgba(176,110,243,0.3), transparent); }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .stat-card { background: var(--color-card); border: 0.5px solid var(--color-border); border-radius: var(--radius-md); padding: 16px 18px; position: relative; overflow: hidden; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg, var(--color-purple), var(--color-purple-light)); }
  .stat-card.green::before { background: linear-gradient(90deg, #22c55e, #4ade80); }
  .stat-card.amber::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .stat-card.red::before { background: linear-gradient(90deg, #ef4444, #f87171); }
  .stat-val { font-size: 28px; font-weight: 700; color: #fff; line-height: 1.1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--color-text-muted); line-height: 1.4; }
  .stat-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 8px; }
  .stat-badge.high { background: rgba(239,68,68,0.2); color: #f87171; }
  .stat-badge.medium { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .stat-badge.low { background: rgba(34,197,94,0.2); color: #4ade80; }
  .stat-badge.good { background: rgba(34,197,94,0.2); color: #4ade80; }

  /* Pipeline bar chart */
  .pipeline-bars { display: flex; flex-direction: column; gap: 10px; }
  .pipeline-bar-row { display: flex; align-items: center; gap: 12px; }
  .pipeline-bar-label { font-size: 13px; color: var(--color-text-muted); width: 120px; flex-shrink: 0; text-align: right; }
  .pipeline-bar-track { flex: 1; height: 32px; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; position: relative; }
  .pipeline-bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding: 0 12px; font-size: 13px; font-weight: 600; color: #fff; transition: width 1s cubic-bezier(.22,1,.36,1); }
  .pipeline-bar-pct { font-size: 13px; color: var(--color-text-muted); width: 40px; text-align: right; }

  /* Score bars */
  .score-display { display: flex; flex-direction: column; gap: 14px; }
  .score-item { }
  .score-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .score-item-label { font-size: 14px; font-weight: 500; color: var(--color-text); }
  .score-item-val { font-size: 18px; font-weight: 700; color: #fff; }
  .score-track { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .score-fill { height: 8px; border-radius: 4px; transition: width 1.2s cubic-bezier(.22,1,.36,1); }
  .score-diagnosis { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; }

  /* Insight blocks */
  .insight-block { background: var(--color-card); border: 0.5px solid var(--color-border); border-radius: var(--radius-md); padding: 16px 18px; margin-bottom: 10px; }
  .insight-block.purple { border-left: 3px solid var(--color-purple); }
  .insight-block.green { border-left: 3px solid #22c55e; }
  .insight-block.amber { border-left: 3px solid #f59e0b; }
  .insight-block.red { border-left: 3px solid #ef4444; }
  .insight-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-purple-light); margin-bottom: 8px; }
  .insight-block.green .insight-title { color: #4ade80; }
  .insight-block.amber .insight-title { color: #fbbf24; }
  .insight-block.red .insight-title { color: #f87171; }
  .insight-text { font-size: 14px; line-height: 1.7; color: var(--color-text); }
  .insight-text strong { color: #fff; }

  /* Stage roadmap */
  .roadmap-stages { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stage-card { background: var(--color-card); border: 0.5px solid var(--color-border); border-radius: var(--radius-md); padding: 14px 16px; position: relative; }
  .stage-num { font-size: 11px; font-weight: 700; color: var(--color-purple-light); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .stage-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .stage-period { font-size: 11px; color: var(--color-text-muted); margin-bottom: 10px; }
  .stage-items { display: flex; flex-direction: column; gap: 4px; }
  .stage-item { font-size: 12px; color: var(--color-text-muted); padding: 3px 0 3px 14px; position: relative; }
  .stage-item::before { content:'→'; position:absolute; left:0; color:var(--color-purple-light); font-size:10px; }

  /* Channel pills */
  .channel-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .channel-pill { background: var(--color-card); border: 0.5px solid var(--color-border); border-radius: 20px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
  .channel-pill.primary { border-color: var(--color-purple); background: var(--color-purple-faint); }
  .channel-pill.secondary { border-color: rgba(138,176,232,0.3); }
  .channel-pill.avoid { border-color: rgba(239,68,68,0.3); opacity: 0.6; }
  .channel-name { font-size: 13px; font-weight: 500; color: #fff; }
  .channel-cpl { font-size: 11px; color: var(--color-text-muted); }

  /* Forecast table */
  .forecast-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .forecast-table th { background: var(--color-purple-faint); color: var(--color-purple-light); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 14px; text-align: left; border-bottom: 0.5px solid var(--color-border); }
  .forecast-table td { padding: 10px 14px; border-bottom: 0.5px solid rgba(255,255,255,0.04); color: var(--color-text); }
  .forecast-table tr:hover td { background: rgba(255,255,255,0.02); }
  .forecast-table .highlight td { background: rgba(124,58,237,0.08); color: #fff; font-weight: 500; }

  /* Canvas chart wrapper */
  .chart-wrap { background: var(--color-card); border: 0.5px solid var(--color-border); border-radius: var(--radius-md); padding: 20px; }

  @keyframes slideInRight { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }

  /* Capacity calculator */
  .capacity-calc { background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(124,58,237,0.08)); border: 0.5px solid rgba(245,158,11,0.3); border-radius: var(--radius-md); padding: 20px; margin-top: 8px; }
  .capacity-calc-title { font-size: 13px; font-weight: 700; color: #fbbf24; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; display:flex; align-items:center; gap:6px; }
  .capacity-metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
  .capacity-metric { background: rgba(0,0,0,0.2); border-radius: var(--radius-sm); padding: 10px 12px; text-align:center; }
  .capacity-metric-val { font-size: 22px; font-weight: 700; color: #fff; }
  .capacity-metric-label { font-size: 11px; color: var(--color-text-muted); margin-top:2px; }
  .capacity-verdict { font-size: 13px; line-height: 1.6; color: var(--color-text); background: rgba(0,0,0,0.15); border-radius: var(--radius-sm); padding: 12px 14px; }
  .capacity-verdict strong { color: #fbbf24; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.8s linear infinite; display: inline-block; }

  @media (max-width: 560px) {
    .grid2, .grid3 { grid-template-columns: 1fr; }
    .output-grid { grid-template-columns: 1fr; }
    .score-label { font-size: 12px; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .progress-wrap { align-items: flex-start; }
    .cac-metric-grid { grid-template-columns: 1fr 1fr; }
  }

</style>

  { title: 'Front-End Offer Concept', short: 'Entry offer', icon: 'ti-gift', desc: 'Low-risk paid entry offer your buyers can say yes to' },

const steps = [

      <div class="grid2">

      const gm = parseFloat(state.data.grossMargin)||70;
      const ltv = parseFloat(state.data.ltv)||acv;

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSources() {
  const labels = { referral:'Referrals', partnerships:'Partnerships', outbound:'Cold outbound', inbound:'Inbound / SEO', events:'Events / trade shows', paid:'Paid media', other:'Other' };
  return Object.entries(labels).map(([k,lbl]) => `
    <div class="source-item${state.data.sources[k]>0?' active':''}" id="src-${k}">
      <input type="checkbox" ${state.data.sources[k]>0?'checked':''} onchange="toggleSource('${k}',this.checked)" />
      <span>${lbl}</span>
      <input type="number" class="source-pct" min="0" max="100" value="${state.data.sources[k]||''}" placeholder="%" ${state.data.sources[k]>0?'':'disabled'} oninput="updateSource('${k}',this.value)" />
    </div>
  `).join('');
}

function totalPct() { return Object.values(state.data.sources).reduce((a,b)=>a+(parseInt(b)||0),0); }

function toggleSource(k, checked) {
  state.data.sources[k] = checked ? 10 : 0;
  document.getElementById('source-grid').innerHTML = renderSources();
  updatePctDisplay();
}

function updateSource(k, val) {
  state.data.sources[k] = parseInt(val)||0;
  document.getElementById('src-'+k).classList.toggle('active', state.data.sources[k]>0);
  updatePctDisplay();
}

function updatePctDisplay() {
  const t = totalPct();
  const el = document.getElementById('pct-total'); if (el) el.textContent = t+'%';
  const warn = document.getElementById('pct-warn'); if (warn) warn.style.display = t!==100?'inline':'none';
}

function setScore(k, v) {
  state.data[k] = v;
  const c = document.getElementById('score-'+k);
  if (c) c.querySelectorAll('.score-btn').forEach((b,i) => b.classList.toggle('active', i+1===v));
}

  document.querySelectorAll('.output-card').forEach((c,idx) => c.classList.toggle('selected', idx===i));

function saveStep() {
  const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  if (state.step === 0) ['companyName','website','industry','founded','teamSize','currentRevenue','targetRevenue'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 1) ['acv','closeRate','salesCycle'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 2) ['grossMargin','ltv','cacBudget'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 3) ['whatWinLooksLike','exitGoal','timeHorizon','investorStage','boardPressure','personalIncome','biggestFear','founderVision'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 4) ['referralRiskAnswer','growthCeiling','salesCallQuality','yearsOnReferrals','demandGenHeadcount','lastTimeNewChannel','whyPaidFailed','coldWarmSplit','readinessBlock','currentClosers','monthlyDealCapacity','hiringPlan','lostDealReason'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 5) ['icp','painPoints','competitors','differentiator','reviewQuotes'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 6) ['currentOffer','desiredOffer','channels','missedOpps'].forEach(k => { state.data[k] = g('f-'+k); });
}


function fmt(n) {
  if (!n || isNaN(n)) return '—';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + Math.round(n/100)*100 >= 1000 ? '$' + (n/1000).toFixed(0) + 'K' : '$' + Math.round(n).toLocaleString();
  return '$' + Math.round(n).toLocaleString();
}
function fmtD(n) { return isNaN(n)||!n ? '—' : '$' + Math.round(n).toLocaleString(); }

function renderCACResults(acv, cr, gm, ltv, cacBudget) {
  if (!acv || !cr) return `<div class="cac-card"><div class="cac-empty">Enter your ACV and close rate on the previous step to unlock your acquisition economics.</div></div>`;

  const effectiveLTV = ltv > 0 ? ltv : acv;
  const grossProfit = effectiveLTV * (gm / 100);
  // Industry rule: max CAC = 33% of LTV for healthy unit economics; aggressive = 50%
  const maxCACHealthy = grossProfit * 0.33;
  const maxCACAgressive = grossProfit * 0.50;
  // Max CPL = maxCAC * closeRate (probability a lead becomes a customer)
  const maxCPLHealthy = maxCACHealthy * (cr / 100);
  const maxCPLAggressive = maxCACAgressive * (cr / 100);
  // Max cost per sales call/meeting (Amplixity: meeting-to-close varies; use close rate)
  const maxCPMHealthy = maxCACHealthy * (cr / 100);
  const maxCPMAggressive = maxCACAgressive * (cr / 100);
  // Amplixity benchmark: $300–$500 per showed meeting
  const ampBenchmark = 400;
  const benchmarkOk = maxCPMHealthy >= ampBenchmark;

  // Revenue needed from new acquisition to justify $10K/mo paid media (example)
  const targetNewRevPerMonth = acv * (cr / 100);

  // If they gave a CAC budget — what ROI does that imply?
  let budgetInsight = '';
  if (cacBudget > 0) {
    const impliedCustomers = cacBudget > 0 ? (maxCACHealthy / cacBudget) : 0;
    const revenuePerCAC = acv;
    const roi = ((revenuePerCAC - cacBudget) / cacBudget * 100).toFixed(0);
    budgetInsight = `At your target CAC of <strong>${fmtD(cacBudget)}</strong>, your implied ROI per customer is <strong>${roi}%</strong> — that's <strong>${fmtD(revenuePerCAC - cacBudget)}</strong> gross revenue per dollar of acquisition spend. ${cacBudget < maxCACHealthy ? 'This is <strong>conservative</strong> — you have room to invest more aggressively and still maintain healthy unit economics.' : cacBudget <= maxCACAgressive ? 'This sits in the <strong>aggressive but viable</strong> range — justifiable if churn is low and LTV holds.' : 'This <strong>exceeds safe CAC thresholds</strong> — revisit your LTV assumptions or close rate before scaling spend.'}`;
  }

  return `
    <div class="cac-card">
      <div class="cac-card-title">Your acquisition economics</div>
      <div class="cac-metric-grid">
        <div class="cac-metric highlight">
          <div class="cac-metric-val">${fmtD(maxCACHealthy)}</div>
          <div class="cac-metric-label">Max CAC<br><span style="font-size:11px;opacity:0.7;">healthy (33% of GP)</span></div>
        </div>
        <div class="cac-metric">
          <div class="cac-metric-val">${fmtD(maxCACAgressive)}</div>
          <div class="cac-metric-label">Max CAC<br><span style="font-size:11px;opacity:0.7;">aggressive (50% of GP)</span></div>
        </div>
        <div class="cac-metric">
          <div class="cac-metric-val">${fmtD(grossProfit)}</div>
          <div class="cac-metric-label">Gross profit<br><span style="font-size:11px;opacity:0.7;">per customer</span></div>
        </div>
        <div class="cac-metric${benchmarkOk?' highlight':''}">
          <div class="cac-metric-val">${fmtD(maxCPMHealthy)}</div>
          <div class="cac-metric-label">Max cost per<br><span style="font-size:11px;opacity:0.7;">sales meeting</span></div>
        </div>
        <div class="cac-metric">
          <div class="cac-metric-val">$300–$500</div>
          <div class="cac-metric-label">Amplixity CPM<br><span style="font-size:11px;opacity:0.7;">benchmark range</span></div>
        </div>
        <div class="cac-metric">
          <div class="cac-metric-val">${fmtD(maxCPLHealthy)}</div>
          <div class="cac-metric-label">Max cost<br><span style="font-size:11px;opacity:0.7;">per qualified lead</span></div>
        </div>
      </div>
      <div class="cac-insight">
        ${!benchmarkOk
          ? `<strong>⚠ Attention:</strong> At your current ACV and close rate, your max cost-per-meeting of <strong>${fmtD(maxCPMHealthy)}</strong> is <em>below</em> the Amplixity benchmark of $300–$500. This means paid acquisition may struggle to be profitable at current deal metrics — the lever is to <strong>increase ACV, improve close rate, or extend LTV</strong> before scaling spend.`
          : `<strong>Good news:</strong> Your numbers support paid acquisition. You can afford up to <strong>${fmtD(maxCPMHealthy)}</strong> per showed meeting — comfortably above the $300–$500 Amplixity benchmark. Every meeting booked inside that cost generates positive unit economics.`
        }
        ${cacBudget > 0 ? '<br><br>' + budgetInsight : ''}
      </div>
    </div>
  `;
}

function recalcCAC() {
  const acv = parseFloat(document.getElementById('f-acv')?.value || state.data.acv) || 0;
  const cr = parseFloat(state.data.closeRate) || 0;
  const gm = parseFloat(document.getElementById('f-grossMargin')?.value) || 70;
  const ltv = parseFloat(document.getElementById('f-ltv')?.value) || 0;
  const budget = parseFloat(document.getElementById('f-cacBudget')?.value) || 0;
  state.data.grossMargin = String(gm);
  state.data.ltv = String(ltv);
  state.data.cacBudget = String(budget);
  const el = document.getElementById('cac-results');
  if (el) el.innerHTML = renderCACResults(acv, cr, gm, ltv, budget);
}


function renderCapacityCalc() {
  const acv = parseFloat(state.data.acv) || 0;
  const cr = parseFloat(state.data.closeRate) || 0;
  const capacity = parseInt(state.data.monthlyDealCapacity) || 0;
  const closers = parseInt(state.data.currentClosers) || 0;

  if (!acv || !cr || !capacity) {
    return '<div class="capacity-calc"><div class="capacity-calc-title"><i class="ti ti-calculator"></i> Capacity reality check</div><div style="font-size:13px;color:var(--color-text-muted);">Enter your ACV, close rate (step 2) and monthly deal capacity above to see your capacity analysis.</div></div>';
  }

  // Meetings needed to fill capacity
  const meetingsToFillCapacity = Math.ceil(capacity / (cr / 100));
  // Revenue at capacity
  const revenueAtCapacity = capacity * acv;
  // Monthly revenue per closer
  const revenuePerCloser = closers > 0 ? Math.round(revenueAtCapacity / closers) : revenueAtCapacity;
  // Amplixity CPM benchmark
  const cpm = 400;
  const monthlySpendToFillCapacity = meetingsToFillCapacity * cpm;
  // Headroom - % of capacity currently being used (assume 20% from referrals)
  const currentMeetings = Math.round(capacity * 0.2);
  const headroomPct = Math.round(((capacity - currentMeetings) / capacity) * 100);

  const verdict = headroomPct >= 60
    ? `You have <strong>${headroomPct}% unused capacity</strong> right now. You could handle <strong>${capacity - currentMeetings} more deals per month</strong> without hiring anyone. At $${acv.toLocaleString()} ACV, that's <strong>$${((capacity - currentMeetings) * acv).toLocaleString()} in reachable monthly revenue</strong> sitting idle. Hiring before filling that gap means paying salaries to wait for leads that aren't coming.`

function renderMarkdown(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let inTable = false;
  let tableHtml = '';
  let tableHeaderDone = false;
  let inList = false;

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Table detection
    if (line.trim().startsWith('|')) {
      const cells = line.split('|').filter((_,i,a) => i>0 && i<a.length-1).map(c => c.trim());
      const isSeparator = cells.every(c => /^[-:]+$/.test(c));
      if (isSeparator) { tableHeaderDone = true; continue; }
      if (!inTable) { inTable = true; tableHtml = '<table class="md-table">'; tableHeaderDone = false; }
      const tag = (!tableHeaderDone && i < lines.length-1 && lines[i+1] && lines[i+1].includes('---')) ? 'th' : (tableHeaderDone ? 'td' : 'th');
      tableHtml += '<tr>' + cells.map(c => '<'+tag+'>'+renderInline(c)+'</'+tag+'>').join('') + '</tr>';
      continue;
    } else if (inTable) {
      html += tableHtml + '</table>';
      inTable = false; tableHtml = ''; tableHeaderDone = false;
    }

    // Close list
    if (inList && !line.match(/^[-*•]\s|^\d+\.\s/)) {
      html += '</ul>'; inList = false;
    }

    // Headings
    if (line.startsWith('### ')) { html += '<h3 class="md-h3">' + renderInline(line.slice(4)) + '</h3>'; continue; }
    if (line.startsWith('## ')) { html += '<h2 class="md-h2">' + renderInline(line.slice(3)) + '</h2>'; continue; }
    if (line.startsWith('# ')) { html += '<h1 class="md-h1">' + renderInline(line.slice(2)) + '</h1>'; continue; }
    // Numbered headings like "1. TITLE" or "2. SECTION NAME"
    if (line.match(/^\d+\.\s+[A-Z][A-Z\s&—–-]+$/)) { html += '<h3 class="md-h3">' + renderInline(line) + '</h3>'; continue; }

    // Horizontal rule
    if (line.match(/^[-=]{3,}$/)) { html += '<hr class="md-hr">'; continue; }

    // Bullet list
    if (line.match(/^[-*•]\s/)) {
      if (!inList) { html += '<ul class="md-list">'; inList = true; }
      html += '<li>' + renderInline(line.replace(/^[-*•]\s/, '')) + '</li>';
      continue;
    }

    // Numbered list
    if (line.match(/^\d+\.\s/)) {
      if (!inList) { html += '<ul class="md-list md-numbered">'; inList = true; }
      html += '<li>' + renderInline(line.replace(/^\d+\.\s/, '')) + '</li>';
      continue;
    }

    // Empty line
    if (line.trim() === '') { html += '<div class="md-gap"></div>'; continue; }

    // Regular paragraph
    html += '<p class="md-p">' + renderInline(line) + '</p>';
  }

  if (inTable) html += tableHtml + '</table>';
  if (inList) html += '</ul>';

  return '<div class="md-body">' + html + '</div>';
}

function renderInline(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>');
}

function renderHiringTrapViz(d, text) {
  const acv = parseFloat(d.acv)||75000;
  const cr = parseFloat(d.closeRate)||25;
  const capacity = parseInt(d.monthlyDealCapacity)||4;
  const cpm = 400;
  const mediaBudget = 5000;
  const meetingsPerMonth = Math.round(mediaBudget/cpm);
  const dealsPerMonth = meetingsPerMonth*(cr/100);
  const revenuePerMonth = dealsPerMonth*acv;
  const salesSalary = 100000/12;
  const unusedCapacity = Math.max(0, Math.round(((capacity-Math.ceil(dealsPerMonth))/capacity)*100));

  // Path A: Hire first (cumulative cash flow)
  const cumA = [-salesSalary, -salesSalary*2, -salesSalary*2.7, -salesSalary*2.2, -salesSalary*1.2, revenuePerMonth*0.3].map(Math.round);
  // Path B: Demand first (cumulative cash flow)
  const cumB = [-mediaBudget, revenuePerMonth*0.2-mediaBudget*2, revenuePerMonth*0.6-mediaBudget*3, revenuePerMonth*1.1-mediaBudget*4, revenuePerMonth*1.8-mediaBudget*5, revenuePerMonth*2.5-mediaBudget*6].map(Math.round);

  const totalRiskA = Math.abs(Math.min(...cumA));
  const totalGainB = cumB[5];

  function tryChart(attempts) {
    const ctx = document.getElementById('hiring-trap-chart');
    if (!ctx||!window.Chart) { if(attempts<20) setTimeout(()=>tryChart(attempts+1),100); return; }
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['M1','M2','M3','M4','M5','M6'],
        datasets: [
          { label: 'Path A: Hire first', data: cumA, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', tension: 0.4, fill: true, pointRadius: 5, pointBackgroundColor: '#ef4444', borderWidth: 2 },
          { label: 'Path B: Demand first', data: cumB, borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.1)', tension: 0.4, fill: true, pointRadius: 5, pointBackgroundColor: '#4ade80', borderWidth: 2 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#f0f0f5', font: { size: 12 } } }, tooltip: { callbacks: { label: c => c.dataset.label+': $'+Math.round(c.parsed.y).toLocaleString() } } },
        scales: {
          x: { ticks: { color: '#8a8aaa' }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: { ticks: { color: '#8a8aaa', callback: v => '$'+Math.round(v/1000)+'K' }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });
  }
  setTimeout(()=>tryChart(0),80);

  return '<div class="viz-wrap">' +
    '<div class="viz-section">' +
    '<div class="stat-grid" style="margin-bottom:16px;">' +
      '<div class="stat-card red"><div class="stat-val">$'+Math.round(totalRiskA/1000)+'K</div><div class="stat-label">Cash at risk: hire first path</div><div class="stat-badge high">HIGH RISK</div></div>' +
      '<div class="stat-card green"><div class="stat-val">$'+Math.round(totalGainB/1000)+'K</div><div class="stat-label">Net gain: demand first path</div><div class="stat-badge good">LOWER RISK</div></div>' +
      '<div class="stat-card amber"><div class="stat-val">'+unusedCapacity+'%</div><div class="stat-label">Unused deal capacity right now</div></div>' +
      '<div class="stat-card"><div class="stat-val">$'+Math.round(mediaBudget/1000)+'K</div><div class="stat-label">Monthly media vs $'+Math.round(salesSalary/1000)+'K salary</div></div>' +
    '</div>' +
    '<div class="insight-block amber" style="margin-bottom:16px;">' +
      '<div class="insight-title">The reframe</div>' +
      '<div class="insight-text">Demand funds hiring. Hiring does not create demand. A salesperson without a pipeline is a <strong>liability, not an asset.</strong></div>' +
    '</div>' +
    '<div class="chart-wrap" style="height:300px;"><canvas id="hiring-trap-chart"></canvas></div>' +
    '</div>' +
    '<div class="viz-section">' +
    '<div class="viz-header"><i class="ti ti-brain"></i> Full analysis</div>' +
    renderMarkdown(text) +
    '</div></div>';
}

      '</div>' +
    '</div>' +
    '<div class="stat-grid" style="margin-bottom:20px;">' +
      '<div class="stat-card green"><div class="stat-val">3–5x</div><div class="stat-label">Higher close rate with entry offer</div></div>' +
      '<div class="stat-card"><div class="stat-val">2wks</div><div class="stat-label">Typical delivery time</div></div>' +
      '<div class="stat-card highlight"><div class="stat-val">80%+</div><div class="stat-label">Convert to full contract</div></div>' +
    '</div>';
  }

  return '<div class="viz-wrap"><div class="viz-section">'+topSection+renderMarkdown(text)+'</div></div>';
}


// ─── CLIENT SESSION SYSTEM (Database-backed) ─────────────────

function generateSessionId() {
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

async function saveCurrentClient() {
  if (!state.clientId) state.clientId = generateSessionId();
  const btn = document.getElementById('save-btn');
  if (btn) btn.innerHTML = '<i class="ti ti-loader spin"></i> Saving...';
  try {
    const resp = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: state.clientId,
        clientName: state.data.companyName || 'Unnamed',
        data: state.data,
        outputs: state.generatedOutputs
      })
    });
    const result = await resp.json();
    if (result.success) {
      const shareUrl = window.location.origin + '/?session=' + state.clientId;
      state.shareUrl = shareUrl;
      if (btn) btn.innerHTML = '<i class="ti ti-check"></i> Saved';
      setTimeout(() => { if (btn) btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save'; }, 2000);
      // Update URL without reload
      window.history.replaceState({}, '', '/?session=' + state.clientId);
    }
  } catch (err) {
    console.error('Save error:', err);
    if (btn) btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save';
  }
}

async function loadSession(id) {
  try {
    const resp = await fetch('/api/sessions/' + id);
    if (!resp.ok) return null;
    const session = await resp.json();
    state.clientId = session.id;
    state.data = session.data || state.data;
    state.generatedOutputs = session.outputs || {};
    state.selectedOutput = 0;
    window.history.replaceState({}, '', '/?session=' + id);
    return session;
  } catch (err) {
    console.error('Load error:', err);
    return null;
  }
}

async function loadClient(id) {
  const session = await loadSession(id);
  if (!session) return alert('Could not load session');
  document.getElementById('main-container').style.maxWidth = '100%';
  showOutputPanel();
}

async function deleteClient(id) {
  if (!confirm('Delete this session?')) return;
  await fetch('/api/sessions/' + id, { method: 'DELETE' });
  toggleSessionsDrawer();
  setTimeout(toggleSessionsDrawer, 50);
}

function startNewSession() {
  state.clientId = 'client_' + Date.now();
  state.step = 0;
  state.generatedOutputs = {};
  state.selectedOutput = 0;
  state.data = {
    companyName:'',website:'',industry:'B2B SaaS',founded:'',acv:'',closeRate:'',salesCycle:'',teamSize:'',currentRevenue:'',targetRevenue:'',
    grossMargin:'70',ltv:'',cacBudget:'',
    sources:{referral:0,partnerships:0,outbound:0,inbound:0,events:0,paid:0,other:0},
    whatWinLooksLike:'',exitGoal:'scale',timeHorizon:'3',investorStage:'bootstrapped',boardPressure:'no',personalIncome:'',biggestFear:'',founderVision:'',
    referralRiskAnswer:'',growthCeiling:'',salesCallQuality:'',yearsOnReferrals:'',demandGenHeadcount:'0',lastTimeNewChannel:'',whyPaidFailed:'',coldWarmSplit:'',
    readinessBlock:'',currentClosers:'',monthlyDealCapacity:'',hiringPlan:'now',lostDealReason:'',
    icp:'',painPoints:'',competitors:'',differentiator:'',productScore:3,audienceScore:3,offerScore:3,funnelScore:3,
    currentOffer:'',desiredOffer:'',channels:'',missedOpps:'',reviewQuotes:''
  };
  document.getElementById('output-panel').style.display = 'none';
  document.getElementById('steps-container').style.display = 'block';
  document.getElementById('main-container').style.maxWidth = '960px';
  document.getElementById('main-container').style.padding = '0 24px';
  renderStep();
}

async function checkUrlSession() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session');
  if (sessionId) {
    const session = await loadSession(sessionId);
    if (session) {
      document.getElementById('main-container').style.maxWidth = '100%';
      showOutputPanel();
      return true;
    }
  }
  return false;
}


async function toggleSessionsDrawer() {
  let drawer = document.getElementById('sessions-drawer');
  if (drawer) { drawer.remove(); return; }

  drawer = document.createElement('div');
  drawer.id = 'sessions-drawer';
  drawer.style.cssText = 'position:fixed;top:0;right:0;width:360px;height:100vh;background:#13131f;border-left:0.5px solid rgba(255,255,255,0.08);z-index:1000;padding:24px;overflow-y:auto;animation:slideInRight 0.25s ease;';
  drawer.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;"><div style="font-size:14px;font-weight:600;color:#fff;">Client sessions</div><button onclick="toggleSessionsDrawer()" style="background:transparent;border:none;color:#8a8aaa;font-size:18px;cursor:pointer;">✕</button></div><div style="font-size:13px;color:#8a8aaa;padding:20px 0;text-align:center;"><i class="ti ti-loader spin"></i> Loading sessions...</div>';
  document.body.appendChild(drawer);

  try {
    const resp = await fetch('/api/sessions');
    const sessions = await resp.json();
    
    const content = sessions.length === 0 
      ? '<div style="font-size:13px;color:#8a8aaa;padding:20px 0;">No saved sessions yet. Complete a workshop and click Save.</div>'
      : sessions.map(s => `
          <div style="background:#1a1a2e;border:0.5px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px;margin-bottom:10px;">
            <div style="font-size:14px;font-weight:500;color:#fff;margin-bottom:2px;">${esc(s.clientName)||'Unnamed'}</div>
            <div style="font-size:12px;color:#8a8aaa;margin-bottom:10px;">${s.outputCount} outputs · ${new Date(s.updatedAt).toLocaleDateString()}</div>
            <div style="font-size:11px;color:#7c3aed;margin-bottom:10px;word-break:break-all;">${window.location.origin}/?session=${s.id}</div>
            <div style="display:flex;gap:8px;">
              <button onclick="loadClient('${s.id}');toggleSessionsDrawer();" style="flex:1;background:#7c3aed;border:none;color:#fff;padding:7px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;">Load</button>
              <button onclick="navigator.clipboard.writeText('${window.location.origin}/?session=${s.id}').then(()=>alert('Link copied!'))" style="background:transparent;border:0.5px solid rgba(124,58,237,0.4);color:#b06ef3;padding:7px 10px;border-radius:7px;font-size:12px;cursor:pointer;"><i class="ti ti-link"></i></button>
              <button onclick="deleteClient('${s.id}')" style="background:transparent;border:0.5px solid rgba(239,68,68,0.3);color:#f87171;padding:7px 10px;border-radius:7px;font-size:12px;cursor:pointer;"><i class="ti ti-trash"></i></button>
            </div>
          </div>
        `).join('');

    drawer.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div style="font-size:14px;font-weight:600;color:#fff;">Client sessions</div>
        <button onclick="toggleSessionsDrawer()" style="background:transparent;border:none;color:#8a8aaa;font-size:18px;cursor:pointer;">✕</button>
      </div>
      ${content}
      <div style="margin-top:16px;border-top:0.5px solid rgba(255,255,255,0.08);padding-top:16px;">
        <button onclick="startNewSession();toggleSessionsDrawer();" style="width:100%;background:transparent;border:0.5px solid rgba(124,58,237,0.5);color:#b06ef3;padding:10px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;"><i class="ti ti-plus"></i> New session</button>
      </div>
    `;
  } catch(err) {
    drawer.innerHTML += '<div style="color:#f87171;font-size:13px;">Could not load sessions</div>';
  }
}



// ─── PARTICLES────────────────────────────────
(function() {
  const canvas = document.getElementById('particle-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const COLS = ['176,110,243','124,58,237','138,176,232'];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (let i=0;i<80;i++) particles.push({ x:Math.random()*1000,y:Math.random()*1000,r:Math.random()*1.6+0.3,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,col:COLS[Math.floor(Math.random()*3)],a:Math.random()*.4+.1,da:(Math.random()-.5)*.003 });
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x+=p.dx; p.y+=p.dy; p.a+=p.da;
      if(p.a<.05||p.a>.6) p.da*=-1;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0; if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba('+p.col+','+p.a.toFixed(2)+')'; ctx.fill();
    });
    for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++) {
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<100) { ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle='rgba(124,58,237,'+((1-d/100)*.05).toFixed(3)+')'; ctx.lineWidth=.5; ctx.stroke(); }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

checkUrlSession().then(loaded => { if (!loaded) startNewSession(); });
</script>
