<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Amplixity GTM Workshop Tool</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --color-bg: #0d0d1a;
    --color-surface: #13131f;
    --color-card: #1a1a2e;
    --color-border: rgba(255,255,255,0.08);
    --color-border-hover: rgba(255,255,255,0.16);
    --color-text: #f0f0f5;
    --color-text-muted: #8a8aaa;
    --color-purple: #7c3aed;
    --color-purple-light: #b06ef3;
    --color-purple-faint: rgba(124,58,237,0.12);
    --color-purple-faint2: rgba(124,58,237,0.2);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body {
    font-family: var(--font);
    background: var(--color-bg);
    color: var(--color-text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  .container { max-width: 760px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--color-surface);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 18px 24px;
    margin-bottom: 20px;
  }
  .logo-sub { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; }
  .progress-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .step-label { font-size: 12px; color: var(--color-text-muted); }
  .progress-bar { width: 180px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 4px; }
  .progress-fill { height: 4px; border-radius: 4px; background: linear-gradient(90deg, var(--color-purple), var(--color-purple-light)); transition: width 0.4s ease; }
  .step-dots { display: flex; gap: 5px; }
  .step-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: all 0.2s; }
  .step-dot.active { background: var(--color-purple-light); width: 18px; border-radius: 4px; }
  .step-dot.done { background: rgba(176,110,243,0.5); }

  /* Sections */
  .section {
    background: var(--color-surface);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--color-purple-light);
    display: flex; align-items: center; gap: 7px; margin-bottom: 4px;
  }
  .section-desc { font-size: 15px; color: var(--color-text-muted); margin-bottom: 18px; line-height: 1.5; }

  /* Fields */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 15px; font-weight: 500; color: var(--color-text); margin-bottom: 5px; }
  label .hint { font-weight: 400; color: var(--color-text-muted); }
  input[type=text], input[type=number], textarea, select {
    width: 100%; background: var(--color-card);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-sm);
    color: var(--color-text);
    font-family: var(--font);
    font-size: 15px;
    padding: 10px 13px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input[type=text]:focus, input[type=number]:focus, textarea:focus, select:focus {
    border-color: var(--color-purple);
  }
  input[type=text]::placeholder, input[type=number]::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }
  textarea { resize: vertical; min-height: 76px; line-height: 1.6; }
  select { cursor: pointer; }
  select option { background: #1a1a2e; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Pipeline sources */
  .source-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-top: 4px; }
  .source-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--color-card); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-sm); padding: 8px 10px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .source-item.active { border-color: var(--color-purple); background: var(--color-purple-faint); }
  .source-item input[type=checkbox] { width: auto; flex-shrink: 0; accent-color: var(--color-purple); cursor: pointer; }
  .source-item span { font-size: 14px; flex: 1; }
  .source-pct { width: 50px !important; font-size: 12px !important; padding: 4px 6px !important; text-align: right; }
  .pct-status { margin-top: 8px; font-size: 12px; color: var(--color-text-muted); }
  .pct-warn { color: #f59e0b; }

  /* Score buttons */
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 0.5px solid var(--color-border); }
  .score-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .score-label { font-size: 15px; flex: 1; line-height: 1.4; }
  .score-btns { display: flex; gap: 5px; }
  .score-btn {
    width: 34px; height: 34px;
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-sm);
    background: var(--color-card);
    font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--color-text-muted);
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .score-btn:hover { border-color: var(--color-purple); color: var(--color-purple-light); }
  .score-btn.active { background: var(--color-purple); border-color: var(--color-purple); color: #fff; }

  /* Output cards */
  .output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .output-card {
    background: var(--color-card); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md); padding: 12px 14px; cursor: pointer;
    transition: all 0.15s;
  }
  .output-card:hover { border-color: var(--color-border-hover); }
  .output-card.selected { border-color: var(--color-purple); background: var(--color-purple-faint); }
  .output-card-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .output-card-desc { font-size: 13px; color: var(--color-text-muted); line-height: 1.4; }

  /* Nav */
  .nav { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; gap: 12px; }
  .btn-back {
    background: transparent; border: 0.5px solid var(--color-border);
    color: var(--color-text-muted); padding: 10px 18px;
    border-radius: var(--radius-md); font-size: 14px; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .btn-back:hover { border-color: var(--color-border-hover); color: var(--color-text); }
  .btn-next {
    background: var(--color-purple); border: none; color: #fff;
    padding: 10px 22px; border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .btn-next:hover { background: #6d28d9; }
  .btn-generate {
    background: var(--color-purple); border: none; color: #fff;
    padding: 11px 24px; border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 7px;
    transition: background 0.15s;
  }
  .btn-generate:hover { background: #6d28d9; }
  .btn-generate:disabled { background: #4a2a7a; color: rgba(255,255,255,0.5); cursor: not-allowed; }

  /* Output panel */
  .tab-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tab {
    padding: 6px 13px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 0.5px solid var(--color-border-hover);
    background: var(--color-card); color: #ffffff;
    transition: all 0.15s; white-space: nowrap;
  }
  .tab:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
  .tab.active { background: var(--color-purple); border-color: var(--color-purple); color: #fff; }
  .tab.done { border-color: rgba(176,110,243,0.5); background: rgba(124,58,237,0.15); color: #fff; }

  .dl-btn {
    background: transparent; border: 0.5px solid var(--color-border-hover);
    color: #fff; padding: 6px 12px;
    border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .dl-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
  .view-btn {
    background: transparent; border: 0.5px solid var(--color-border-hover);
    color: #fff; padding: 6px 12px;
    border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .view-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }

  .result-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--color-purple-faint2); color: var(--color-purple-light);
    font-size: 12px; font-weight: 500; padding: 4px 10px;
    border-radius: var(--radius-sm); margin-bottom: 12px;
  }
  .result-box {
    background: var(--color-card); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md); padding: 18px 20px;
    font-size: 15px; line-height: 1.8; color: var(--color-text);
    white-space: pre-wrap; font-family: var(--font);
    max-height: 520px; overflow-y: auto;
  }
  .result-box.placeholder { color: var(--color-text-muted); font-style: italic; }
  .result-box::-webkit-scrollbar { width: 4px; }
  .result-box::-webkit-scrollbar-track { background: transparent; }
  .result-box::-webkit-scrollbar-thumb { background: var(--color-border-hover); border-radius: 2px; }

  /* Copy button */
  .copy-btn {
    background: transparent; border: 0.5px solid var(--color-border-hover);
    color: #fff; padding: 6px 12px;
    border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
    font-family: var(--font); display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }

  .cac-card {
    background: var(--color-card); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md); padding: 16px 20px; margin-top: 16px;
  }
  .cac-card-title { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-purple-light); margin-bottom: 12px; }
  .cac-metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .cac-metric { background: var(--color-surface); border: 0.5px solid var(--color-border); border-radius: var(--radius-sm); padding: 12px 14px; text-align: center; }
  .cac-metric-val { font-size: 22px; font-weight: 700; color: var(--color-purple-light); line-height: 1.2; }
  .cac-metric-label { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; line-height: 1.3; }
  .cac-metric.highlight { border-color: var(--color-purple); background: var(--color-purple-faint); }
  .cac-metric.highlight .cac-metric-val { color: #fff; }
  .cac-insight { margin-top: 14px; padding: 12px 14px; background: rgba(176,110,243,0.08); border-left: 3px solid var(--color-purple); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 14px; line-height: 1.6; color: var(--color-text-muted); }
  .cac-insight strong { color: var(--color-text); }
  .cac-empty { font-size: 14px; color: var(--color-text-muted); font-style: italic; padding: 8px 0; }


  /* ── Particle / ambient background ── */
  #particle-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; opacity:0.45; }
  .container { position:relative; z-index:1; }

  /* ── Step slide-in ── */
  @keyframes slideUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
  .section { animation: slideUp 0.38s cubic-bezier(.22,1,.36,1) both; }

  /* ── Field focus glow ── */
  input[type=text]:focus, input[type=number]:focus, textarea:focus, select:focus {
    border-color: var(--color-purple);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.18);
  }

  /* ── Output streaming text ── */
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .result-box { animation: fadeIn 0.3s ease; }

  /* ── Pulse on generate button ── */
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.5); }
    50%      { box-shadow: 0 0 0 8px rgba(124,58,237,0); }
  }
  .btn-generate:not(:disabled) { animation: pulse-glow 2.4s ease infinite; }

  /* ── Score button hover pop ── */
  .score-btn:hover { transform: scale(1.12); }

  /* ── Tab slide indicator ── */
  .tab { position:relative; overflow:hidden; }
  .tab::after { content:''; position:absolute; bottom:0; left:50%; width:0; height:2px; background:var(--color-purple-light); transition: width 0.2s ease, left 0.2s ease; }
  .tab:hover::after { width:80%; left:10%; }
  .tab.active::after { width:100%; left:0; }

  /* ── Output card hover lift ── */
  .output-card { transition: all 0.18s ease; }
  .output-card:hover { transform: translateY(-2px); border-color: rgba(176,110,243,0.5); }
  .output-card.selected { transform: translateY(-2px); }

  /* ── Header shimmer on logo ── */
  .header { position:relative; overflow:hidden; }
  .header::before { content:''; position:absolute; top:-50%; left:-60%; width:40%; height:200%; background:linear-gradient(105deg,transparent 40%,rgba(176,110,243,0.06) 50%,transparent 60%); animation: shimmer 4s ease infinite; pointer-events:none; }
  @keyframes shimmer { 0%{left:-60%} 100%{left:160%} }

  /* ── Progress fill pulse ── */
  .progress-fill { position:relative; }
  .progress-fill::after { content:''; position:absolute; right:0; top:0; height:100%; width:20px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4)); animation: progress-shine 1.5s ease infinite; border-radius:4px; }
  @keyframes progress-shine { 0%,100%{opacity:0} 50%{opacity:1} }

  /* ── Source item check bounce ── */
  .source-item { transition: all 0.18s ease; }
  .source-item.active { transform: scale(1.02); }

  /* ── CAC metric highlight pulse ── */
  .cac-metric.highlight { animation: cac-pulse 3s ease infinite; }
  @keyframes cac-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0)} 50%{box-shadow:0 0 0 6px rgba(124,58,237,0.12)} }

  /* ── Generating spinner text fade ── */
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
  .generating-dots::after { content:'.'; animation: dots 1.2s steps(1) infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.8s linear infinite; display: inline-block; }

  @media (max-width: 560px) {
    .grid2, .grid3 { grid-template-columns: 1fr; }
    .output-grid { grid-template-columns: 1fr; }
    .score-label { font-size: 12px; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .progress-wrap { align-items: flex-start; }
    .cac-metric-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<script>
const state = {
  step: 0,
  data: {
    companyName: '', website: '', industry: 'B2B SaaS', founded: '',
    acv: '', closeRate: '', salesCycle: '', teamSize: '',
    currentRevenue: '', targetRevenue: '',
    grossMargin: '70', ltv: '', cacBudget: '',

    // Founder goals
    founderVision: '', exitGoal: 'scale', timeHorizon: '3', personalIncome: '',

    // Growth reality check
    referralRiskAnswer: '', coldWarmSplit: '', whyPaidFailed: '',
    growthCeiling: '', yearsOnReferrals: '', demandGenHeadcount: '0',
    lastTimeNewChannel: '', salesCallQuality: '',
    // Buyer & market

    currentOffer: '', desiredOffer: '', channels: '', missedOpps: '', reviewQuotes: ''
  },
  selectedOutput: 0,
  generatedOutputs: {}
};

const outputDefs = [
  { title: 'Pipeline Dependency Map', short: 'Pipeline map', icon: 'ti-chart-pie', desc: '% of pipeline by source + concentration risk score' },
  { title: 'Message-Market-Fit Assessment', short: 'Msg-market fit', icon: 'ti-message-circle', desc: 'Cold-market value prop gaps vs. buyer pain language' },
  { title: 'ICP & TAM Mapping', short: 'ICP & TAM', icon: 'ti-target', desc: 'Named account universe + TAM qualification vs. 5K floor' },
  { title: 'Competitive Positioning Snapshot', short: 'Competitive', icon: 'ti-swords', desc: 'Competitive landscape + unused wedge opportunity' },
  { title: 'GTM Plan', short: 'GTM plan', icon: 'ti-rocket', desc: 'Prospect journey, sample ads, missed opportunities' },
  { title: 'Core 4 Scorecard', short: 'Scorecard', icon: 'ti-clipboard-check', desc: 'Product / Audience / Offer / Funnel scored 1–5' },
  { title: 'Front-End Offer Concept', short: 'Entry offer', icon: 'ti-gift', desc: 'Low-risk paid entry offer your buyers can say yes to' },
  { title: '12-Month Pipeline Forecast', short: 'ROI forecast', icon: 'ti-trending-up', desc: 'Meetings → deals → revenue model with CPM benchmarks' },
  { title: '6-Stage Roadmap', short: 'Roadmap', icon: 'ti-map-2', desc: 'Sequence to install owned channel alongside referrals' },
  { title: 'Channel Mix Recommendation', short: 'Channels', icon: 'ti-broadcast', desc: 'Where to surround your specific buyers and why' }

const steps = [
  {
    title: 'Company basics',
    icon: 'ti-building',
    desc: 'Core business details for your GTM analysis',
    render: () => `

        <div class="field"><label>Company name</label><input type="text" id="f-companyName" value="${esc(state.data.companyName)}" placeholder="Acme Corp" /></div>

      </div>
      <div class="grid3">
        <div class="field"><label>Industry / vertical</label><select id="f-industry">${['B2B SaaS','AI Infrastructure','Software Development','Consulting','Robotics & Automation','Other'].map(o=>`<option${state.data.industry===o?' selected':''}>${o}</option>`).join('')}</select></div>
        <div class="field"><label>Year founded</label><input type="text" id="f-founded" value="${esc(state.data.founded)}" placeholder="2021" /></div>
        <div class="field"><label>Team size</label><input type="text" id="f-teamSize" value="${esc(state.data.teamSize)}" placeholder="12" /></div>

      <div class="grid2">
        <div class="field"><label>Current ARR / revenue <span class="hint">(approx.)</span></label><input type="text" id="f-currentRevenue" value="${esc(state.data.currentRevenue)}" placeholder="$800K" /></div>
        <div class="field"><label>12-month revenue target</label><input type="text" id="f-targetRevenue" value="${esc(state.data.targetRevenue)}" placeholder="$2M" /></div>
      </div>
    `

  {
    title: 'Pipeline & deal metrics',
    icon: 'ti-chart-bar',
    desc: 'How your pipeline looks today — this powers the forecast model',
    render: () => `

        <div class="field"><label>Average contract value <span class="hint">($)</span></label><input type="number" id="f-acv" value="${state.data.acv}" placeholder="75000" /></div>

      </div>

    title: 'CAC & acquisition economics',
    icon: 'ti-calculator',
    desc: 'Discover what you can actually afford to pay to acquire a customer — and how this connects to your growth goals',
    render: () => {
      const acv = parseFloat(state.data.acv)||0;
      const cr = parseFloat(state.data.closeRate)||0;
      const gm = parseFloat(state.data.grossMargin)||70;
      const ltv = parseFloat(state.data.ltv)||acv;
      return `
      <div class="grid3">
        <div class="field"><label>Gross margin <span class="hint">(%)</span></label><input type="number" id="f-grossMargin" value="${state.data.grossMargin}" placeholder="70" oninput="recalcCAC()" /></div>
        <div class="field"><label>Customer LTV <span class="hint">($, if known)</span></label><input type="number" id="f-ltv" value="${state.data.ltv}" placeholder="Leave blank to use ACV" oninput="recalcCAC()" /></div>
        <div class="field"><label>Target CAC budget <span class="hint">($ you'd consider investing)</span></label><input type="number" id="f-cacBudget" value="${state.data.cacBudget}" placeholder="Optional" oninput="recalcCAC()" /></div>

      <div id="cac-results">${renderCACResults(acv, cr, gm, ltv, parseFloat(state.data.cacBudget)||0)}</div>

        <label>In 3 years, what does winning look like for you personally? <span class="hint">— be specific, not corporate</span></label>
        <textarea id="f-whatWinLooksLike" placeholder="e.g. I want to step back from sales entirely, have a team that runs without me, and take a proper holiday. Or: I want to exit at 8x revenue and move to Portugal." style="min-height:80px;">${esc(state.data.whatWinLooksLike)}</textarea>
      </div>
      <div class="grid3">
        <div class="field"><label>Primary goal</label>

        </div>
        <div class="field"><label>Time horizon <span class="hint">(years)</span></label>

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSources() {
  const labels = { referral:'Referrals', partnerships:'Partnerships', outbound:'Cold outbound', inbound:'Inbound / SEO', events:'Events / trade shows', paid:'Paid media', other:'Other' };
  return Object.entries(labels).map(([k,lbl]) => `
    <div class="source-item${state.data.sources[k]>0?' active':''}" id="src-${k}">
      <input type="checkbox" ${state.data.sources[k]>0?'checked':''} onchange="toggleSource('${k}',this.checked)" />
      <span>${lbl}</span>
      <input type="number" class="source-pct" min="0" max="100" value="${state.data.sources[k]||''}" placeholder="%" ${state.data.sources[k]>0?'':'disabled'} oninput="updateSource('${k}',this.value)" />
    </div>
  `).join('');
}

function totalPct() { return Object.values(state.data.sources).reduce((a,b)=>a+(parseInt(b)||0),0); }

function toggleSource(k, checked) {
  state.data.sources[k] = checked ? 10 : 0;
  document.getElementById('source-grid').innerHTML = renderSources();
  updatePctDisplay();
}

function updateSource(k, val) {
  state.data.sources[k] = parseInt(val)||0;
  document.getElementById('src-'+k).classList.toggle('active', state.data.sources[k]>0);
  updatePctDisplay();
}

function updatePctDisplay() {
  const t = totalPct();
  const el = document.getElementById('pct-total'); if (el) el.textContent = t+'%';
  const warn = document.getElementById('pct-warn'); if (warn) warn.style.display = t!==100?'inline':'none';
}

function setScore(k, v) {
  state.data[k] = v;
  const c = document.getElementById('score-'+k);
  if (c) c.querySelectorAll('.score-btn').forEach((b,i) => b.classList.toggle('active', i+1===v));
}

function selectOutput(i) {
  state.selectedOutput = i;
  document.querySelectorAll('.output-card').forEach((c,idx) => c.classList.toggle('selected', idx===i));
}

function saveStep() {
  const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  if (state.step === 0) ['companyName','website','industry','founded','teamSize','currentRevenue','targetRevenue'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 1) ['acv','closeRate','salesCycle'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 2) ['grossMargin','ltv','cacBudget'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 3) ['whatWinLooksLike','exitGoal','timeHorizon','investorStage','boardPressure','personalIncome','biggestFear','founderVision'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 4) ['referralRiskAnswer','growthCeiling','salesCallQuality','yearsOnReferrals','demandGenHeadcount','lastTimeNewChannel','whyPaidFailed','coldWarmSplit'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 5) ['icp','painPoints','competitors','differentiator','reviewQuotes'].forEach(k => { state.data[k] = g('f-'+k); });
  else if (state.step === 6) ['currentOffer','desiredOffer','channels','missedOpps'].forEach(k => { state.data[k] = g('f-'+k); });
}

function fmt(n) {
  if (!n || isNaN(n)) return '—';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + Math.round(n/100)*100 >= 1000 ? '$' + (n/1000).toFixed(0) + 'K' : '$' + Math.round(n).toLocaleString();
  return '$' + Math.round(n).toLocaleString();
}
function fmtD(n) { return isNaN(n)||!n ? '—' : '$' + Math.round(n).toLocaleString(); }

function renderCACResults(acv, cr, gm, ltv, cacBudget) {
  if (!acv || !cr) return `<div class="cac-card"><div class="cac-empty">Enter your ACV and close rate on the previous step to unlock your acquisition economics.</div></div>`;

  const effectiveLTV = ltv > 0 ? ltv : acv;
  const grossProfit = effectiveLTV * (gm / 100);
  // Industry rule: max CAC = 33% of LTV for healthy unit economics; aggressive = 50%
  const maxCACHealthy = grossProfit * 0.33;
  const maxCACAgressive = grossProfit * 0.50;
  // Max CPL = maxCAC * closeRate (probability a lead becomes a customer)
  const maxCPLHealthy = maxCACHealthy * (cr / 100);
  const maxCPLAggressive = maxCACAgressive * (cr / 100);
  // Max cost per sales call/meeting (Amplixity: meeting-to-close varies; use close rate)
  const maxCPMHealthy = maxCACHealthy * (cr / 100);
  const maxCPMAggressive = maxCACAgressive * (cr / 100);
  // Amplixity benchmark: $300–$500 per showed meeting
  const ampBenchmark = 400;
  const benchmarkOk = maxCPMHealthy >= ampBenchmark;

  // Revenue needed from new acquisition to justify $10K/mo paid media (example)
  const targetNewRevPerMonth = acv * (cr / 100);

  // If they gave a CAC budget — what ROI does that imply?
  let budgetInsight = '';
  if (cacBudget > 0) {
    const impliedCustomers = cacBudget > 0 ? (maxCACHealthy / cacBudget) : 0;
    const revenuePerCAC = acv;
    const roi = ((revenuePerCAC - cacBudget) / cacBudget * 100).toFixed(0);
    budgetInsight = `At your target CAC of <strong>${fmtD(cacBudget)}</strong>, your implied ROI per customer is <strong>${roi}%</strong> — that's <strong>${fmtD(revenuePerCAC - cacBudget)}</strong> gross revenue per dollar of acquisition spend. ${cacBudget < maxCACHealthy ? 'This is <strong>conservative</strong> — you have room to invest more aggressively and still maintain healthy unit economics.' : cacBudget <= maxCACAgressive ? 'This sits in the <strong>aggressive but viable</strong> range — justifiable if churn is low and LTV holds.' : 'This <strong>exceeds safe CAC thresholds</strong> — revisit your LTV assumptions or close rate before scaling spend.'}`;
  }

  return `
    <div class="cac-card">
      <div class="cac-card-title">Your acquisition economics</div>
      <div class="cac-metric-grid">
        <div class="cac-metric highlight">
          <div class="cac-metric-val">${fmtD(maxCACHealthy)}</div>
          <div class="cac-metric-label">Max CAC<br><span style="font-size:11px;opacity:0.7;">healthy (33% of GP)</span></div>
        </div>
        <div class="cac-metric">
          <div class="cac-metric-val">${fmtD(maxCACAgressive)}</div>
          <div class="cac-metric-label">Max CAC<br><span style="font-size:11px;opacity:0.7;">aggressive (50% of GP)</span></div>
        </div>
        <div class="cac-metric">
          <div class="cac-metric-val">${fmtD(grossProfit)}</div>
          <div class="cac-metric-label">Gross profit<br><span style="font-size:11px;opacity:0.7;">per customer</span></div>
        </div>
        <div class="cac-metric${benchmarkOk?' highlight':''}">
          <div class="cac-metric-val">${fmtD(maxCPMHealthy)}</div>
          <div class="cac-metric-label">Max cost per<br><span style="font-size:11px;opacity:0.7;">sales meeting</span></div>
        </div>
        <div class="cac-metric">
          <div class="cac-metric-val">$300–$500</div>
          <div class="cac-metric-label">Amplixity CPM<br><span style="font-size:11px;opacity:0.7;">benchmark range</span></div>
        </div>
        <div class="cac-metric">
          <div class="cac-metric-val">${fmtD(maxCPLHealthy)}</div>
          <div class="cac-metric-label">Max cost<br><span style="font-size:11px;opacity:0.7;">per qualified lead</span></div>
        </div>
      </div>
      <div class="cac-insight">
        ${!benchmarkOk
          ? `<strong>⚠ Attention:</strong> At your current ACV and close rate, your max cost-per-meeting of <strong>${fmtD(maxCPMHealthy)}</strong> is <em>below</em> the Amplixity benchmark of $300–$500. This means paid acquisition may struggle to be profitable at current deal metrics — the lever is to <strong>increase ACV, improve close rate, or extend LTV</strong> before scaling spend.`
          : `<strong>Good news:</strong> Your numbers support paid acquisition. You can afford up to <strong>${fmtD(maxCPMHealthy)}</strong> per showed meeting — comfortably above the $300–$500 Amplixity benchmark. Every meeting booked inside that cost generates positive unit economics.`
        }
        ${cacBudget > 0 ? '<br><br>' + budgetInsight : ''}
      </div>
    </div>
  `;
}

function recalcCAC() {
  const acv = parseFloat(document.getElementById('f-acv')?.value || state.data.acv) || 0;
  const cr = parseFloat(state.data.closeRate) || 0;
  const gm = parseFloat(document.getElementById('f-grossMargin')?.value) || 70;
  const ltv = parseFloat(document.getElementById('f-ltv')?.value) || 0;
  const budget = parseFloat(document.getElementById('f-cacBudget')?.value) || 0;
  state.data.grossMargin = String(gm);
  state.data.ltv = String(ltv);
  state.data.cacBudget = String(budget);
  const el = document.getElementById('cac-results');
  if (el) el.innerHTML = renderCACResults(acv, cr, gm, ltv, budget);
}

function renderStep() {
  const s = steps[state.step];
  document.getElementById('steps-container').innerHTML = `
    <div class="section">
      <div class="section-title"><i class="ti ${s.icon}"></i> ${s.title}</div>
      <div class="section-desc">${s.desc}</div>
      ${s.render()}
    </div>
    <div class="nav">
      ${state.step > 0 ? `<button class="btn-back" onclick="prevStep()"><i class="ti ti-arrow-left"></i> Back</button>` : '<div></div>'}
      <button class="btn-next" onclick="nextStep()">
        ${state.step < steps.length-1 ? 'Continue <i class="ti ti-arrow-right"></i>' : '<i class="ti ti-sparkles"></i> Go to outputs'}
      </button>
    </div>
  `;
  updateProgress();
}

function updateProgress() {
  const pct = ((state.step+1)/steps.length)*100;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('step-label').textContent = `Step ${state.step+1} of 8`;
  document.getElementById('step-dots').innerHTML = steps.map((_,i) =>
    `<div class="step-dot${i===state.step?' active':i<state.step?' done':''}"></div>`
  ).join('');
}

function nextStep() {
  saveStep();
  if (state.step < steps.length-1) { state.step++; renderStep(); }
  else showOutputPanel();
}

function prevStep() { saveStep(); state.step--; renderStep(); }

function showOutputPanel() {
  document.getElementById('steps-container').style.display = 'none';
  document.getElementById('output-panel').style.display = 'block';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('step-label').textContent = 'Outputs ready';
  document.getElementById('step-dots').innerHTML = steps.map(() => `<div class="step-dot done"></div>`).join('');
  renderOutputPanel();
}

function copyOutput(i) {
  const text = state.generatedOutputs[i] || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.innerHTML = '<i class="ti ti-check"></i> Copied'; setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy"></i> Copy'; }, 2000); }
  });
}

function downloadOutput(i) {
  const def = outputDefs[i];
  const text = state.generatedOutputs[i] || '';
  const company = state.data.companyName || 'client';
  const filename = `${company.toLowerCase().replace(/\s+/g,'-')}-${def.short.toLowerCase().replace(/\s+/g,'-')}.txt`;
  const blob = new Blob([`AMPLIXITY GTM WORKSHOP\n${def.title}\nClient: ${state.data.companyName || 'N/A'}\nGenerated: ${new Date().toLocaleDateString()}\n${'='.repeat(60)}\n\n${text}`], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Particle canvas ──────────────────────────────────────────
(function() {
  const canvas = document.getElementById('particle-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const COLORS = ['rgba(176,110,243,', 'rgba(124,58,237,', 'rgba(138,176,232,'];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function makeParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.4,
      dx: (Math.random() - 0.5) * 0.35,
      dy: (Math.random() - 0.5) * 0.35,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: Math.random() * 0.5 + 0.1,
      da: (Math.random() - 0.5) * 0.004
    };
  }

  for (let i = 0; i < 90; i++) particles.push(makeParticle());

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.dx; p.y += p.dy;
      p.alpha += p.da;
      if (p.alpha <= 0.05 || p.alpha >= 0.65) p.da *= -1;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.alpha.toFixed(2) + ')';
      ctx.fill();
    });

    // draw faint connection lines between nearby particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 110) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(124,58,237,' + ((1 - dist/110) * 0.06).toFixed(3) + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

async function streamOutput(i, promptText) {
  const def = outputDefs[i];
  const btn = document.getElementById('gen-btn');
  const icon = document.getElementById('gen-icon');
  const box = document.getElementById('result-box');
  btn.disabled = true;
  if (icon) icon.className = 'ti ti-loader spin';
  if (box) {
    box.className = 'result-box placeholder';
    box.innerHTML = '<span class="generating-dots">Generating ' + def.title + '</span>';
  }

  let fullText = '';
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1200,
        stream: false,
        system: document.getElementById('systemPromptData').textContent,
        messages: [{ role: 'user', content: promptText }]
      })
    });
    const data = await response.json();
    fullText = data.content?.find(b => b.type === 'text')?.text || 'Error generating output.';
  } catch(err) {
    fullText = 'Connection error. Please check your internet connection and try again.';
  }

  // Simulate streaming: reveal text word by word for excitement
  state.generatedOutputs[i] = fullText;
  if (box) {
    box.className = 'result-box';
    box.textContent = '';
    const words = fullText.split(' ');
    let wi = 0;
    function revealNext() {
      if (wi >= words.length) {
        renderOutputPanel();
        return;
      }
      const chunk = Math.min(4, words.length - wi);
      box.textContent += (wi > 0 ? ' ' : '') + words.slice(wi, wi+chunk).join(' ');
      box.scrollTop = box.scrollHeight;
      wi += chunk;
      setTimeout(revealNext, 12);
    }
    revealNext();
  } else {
    renderOutputPanel();
  }

  btn.disabled = false;
  if (icon) icon.className = 'ti ti-sparkles';
}
